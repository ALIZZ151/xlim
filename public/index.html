<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>XLIMSTORE — Premium Digital Store</title>
  <meta name="description" content="XLIMSTORE adalah web store produk digital dengan checkout otomatis Pakasir, QRIS, status pembayaran real-time, dan admin support resmi." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://xlim.alizz.my.id/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="XLIMSTORE" />
  <meta property="og:title" content="XLIMSTORE — Premium Digital Store" />
  <meta property="og:description" content="Pilih produk digital, buat invoice otomatis, bayar via QRIS/VA Pakasir, dan cek status pembayaran langsung dari website." />
  <meta property="og:image" content="https://xlim.alizz.my.id/assets/img/xlimstore-profile.webp" />
  <meta property="og:url" content="https://xlim.alizz.my.id/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="XLIMSTORE — Premium Digital Store" />
  <meta name="twitter:description" content="Checkout otomatis Pakasir untuk produk digital XLIMSTORE." />
  <meta name="twitter:image" content="https://xlim.alizz.my.id/assets/img/xlimstore-profile.webp" />
  <link rel="icon" href="/assets/img/favicon.ico" />
  <link rel="apple-touch-icon" href="/assets/img/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preload" href="/styles.css" as="style" />
  <link rel="preload" href="/assets/video/loading-poster.jpg" as="image" />
  <link rel="preload" href="/assets/video/loading.mp4" as="video" type="video/mp4" />
  <link rel="stylesheet" href="/styles.css" />
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"Store","name":"XLIMSTORE","url":"https://xlim.alizz.my.id","logo":"https://xlim.alizz.my.id/assets/img/xlimstore-profile.webp","description":"Web store produk digital dengan checkout otomatis Pakasir."}
  </script>
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebSite","name":"XLIMSTORE","url":"https://xlim.alizz.my.id","potentialAction":{"@type":"SearchAction","target":"https://xlim.alizz.my.id/produk?q={search_term_string}","query-input":"required name=search_term_string"}}
  </script>
</head>
<body>
  <a class="skip-link" href="#app">Lewati ke konten</a>

  <div class="splash-screen" id="splashScreen" aria-label="Loading XLIMSTORE">
    <img class="splash-poster" src="/assets/video/loading-poster.jpg" alt="" aria-hidden="true" />
    <video id="splashVideo" autoplay muted playsinline preload="auto" poster="/assets/video/loading-poster.jpg">
      <source src="/assets/video/loading.mp4" type="video/mp4" />
    </video>
    <div class="splash-content">
      <img class="splash-logo" src="/assets/img/xlimstore-profile.webp" alt="XLIMSTORE" />
      <b>XLIMSTORE</b>
      <div class="splash-loader" aria-hidden="true"><span></span></div>
    </div>
  </div>

  <header class="topbar" aria-label="Navigasi utama">
    <a class="brand" href="/demo" data-link aria-label="XLIMSTORE Beranda">
      <img src="/assets/img/xlimstore-profile.webp" width="44" height="44" alt="Logo XLIMSTORE" />
      <span><strong>XLIMSTORE</strong><small>premium digital store</small></span>
    </a>
    <nav class="desktop-nav" aria-label="Menu desktop">
      <a href="/demo" data-link>Home</a>
      <a href="/produk" data-link>Produk</a>
      <a href="/rating" data-link>Rating</a>
    </nav>
  </header>

  <main id="app" class="app-shell" tabindex="-1"></main>

  <nav class="bottom-nav" aria-label="Menu bawah">
    <a href="/demo" data-link data-route="/demo" aria-label="Home"><span aria-hidden="true">◆</span><b>Home</b></a>
    <a href="/produk" data-link data-route="/produk" aria-label="Produk"><span aria-hidden="true">▣</span><b>Produk</b></a>
    <a href="/rating" data-link data-route="/rating" aria-label="Rating"><span aria-hidden="true">★</span><b>Rating</b></a>
  </nav>

  <div class="contact-float hidden" id="contactFloat" aria-label="Kontak admin cepat">
    <button type="button" id="floatWa" aria-label="Chat WhatsApp admin"><img src="/assets/img/whatsapp-icon.webp" alt="" width="42" height="42" loading="lazy" /></button>
    <button type="button" id="floatTg" aria-label="Chat Telegram admin"><span aria-hidden="true">✈</span></button>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="modal" id="modal" aria-hidden="true"></div>
  <script src="/config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <script src="/app.js" defer></script>
</body>
</html>
